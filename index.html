    --cream:#16233a; --cream-dim:#5c6b80; --line:#d8e2f0; --ok:#16a34a;
  }
  *{box-sizing:border-box;} body{margin:0;}
  html,body{background:var(--iron-950);color:var(--cream);font-family:'Manrope',sans-serif;min-height:100vh;}
  h1,h2,h3,.display{font-family:'Marcellus',serif;font-weight:400;letter-spacing:.02em;color:var(--cream);}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;} button{font-family:inherit;cursor:pointer;}
  .scrollwork{height:22px;width:100%;background-repeat:repeat-x;background-size:88px 22px;opacity:.55;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='88' height='22' viewBox='0 0 88 22'><path d='M2 11 C10 2, 18 2, 22 11 C26 20, 34 20, 38 11 C42 2, 50 2, 44 11' fill='none' stroke='%232f6fed' stroke-width='1.4'/><circle cx='2' cy='11' r='2' fill='%232f6fed'/><circle cx='44' cy='11' r='2' fill='%232f6fed'/></svg>");}
  header{padding:28px clamp(20px,5vw,64px) 0;max-width:1240px;margin:0 auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:18px;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;flex-direction:column;}
  .brand .mark{font-size:1.7rem;} .brand .mark b{color:var(--brass);font-style:normal;}
  .brand .tag{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-dim);margin-top:2px;}
  nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{border:1px solid var(--line);background:transparent;color:var(--cream);padding:10px 18px;border-radius:2px;font-size:.85rem;letter-spacing:.03em;transition:border-color .15s,color .15s;}
  .btn:hover{border-color:var(--brass);color:var(--brass);}
  .btn-solid{background:var(--brass);border-color:var(--brass);color:var(--iron-950);font-weight:600;}
  .btn-solid:hover{background:var(--ember-bright);border-color:var(--ember-bright);color:var(--cream);}
  .btn-ember{border-color:var(--ember);color:var(--ember-bright);} .btn-ember:hover{background:var(--ember);color:var(--cream);}
  .btn-ghost{border-color:transparent;opacity:.7;} .btn-ghost:hover{opacity:1;border-color:var(--line);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2px solid var(--brass); outline-offset:2px;}
  .lang-switch{display:flex;border:1px solid var(--line);border-radius:2px;overflow:hidden;}
  .lang-switch button{border:none;background:transparent;color:var(--cream-dim);padding:8px 12px;font-size:.78rem;font-weight:700;letter-spacing:.04em;}
  .lang-switch button.active{background:var(--brass);color:var(--iron-950);}
  main{max-width:1240px;margin:0 auto;padding:8px clamp(20px,5vw,64px) 80px;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:18px 0 22px;}
  .filters select, .filters input{background:var(--iron-900);border:1px solid var(--line);color:var(--cream);padding:9px 12px;border-radius:2px;font-size:.85rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
  .card{background:var(--iron-900);border:1px solid var(--line);border-radius:3px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s;}
  .card:hover{border-color:var(--brass-dim);}
  .card-photo{height:170px;background:linear-gradient(160deg,var(--iron-800),var(--iron-950));display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--line);}
  .card-photo img{width:100%;height:100%;object-fit:cover;}
  .gate-glyph{width:64px;height:64px;opacity:.5;}
  .type-tag{position:absolute;top:10px;left:10px;background:rgba(22,35,58,.88);border:1px solid var(--brass-dim);color:#fff;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:2px;}
  .fav-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;border:1px solid var(--brass-dim);background:rgba(22,35,58,.88);color:#e7edf7;font-size:1.1rem;line-height:1;display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s;}
  .fav-btn:hover{color:var(--brass);border-color:var(--brass);}
  .fav-btn.active{color:var(--brass);border-color:var(--brass);}
  .fav-btn-detail{border:1px solid var(--line);background:transparent;color:var(--cream-dim);padding:10px 18px;border-radius:2px;font-size:.85rem;}
  .fav-btn-detail.active{color:var(--brass);border-color:var(--brass);}
  .card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .card-title{font-size:1.05rem;}
  .specs{display:flex;flex-wrap:wrap;gap:6px;font-size:.76rem;color:var(--cream-dim);}
  .specs span{background:var(--iron-800);padding:3px 8px;border-radius:2px;border:1px solid var(--line);}
  .price{font-size:1.3rem;color:var(--brass);margin-top:2px;}
  .card-actions{display:flex;gap:8px;margin-top:auto;padding-top:6px;}
  .card-actions .btn{flex:1;text-align:center;padding:9px 8px;font-size:.8rem;}
  .empty{text-align:center;padding:60px 20px;color:var(--cream-dim);border:1px dashed var(--line);border-radius:3px;}
  .panel{background:var(--iron-900);border:1px solid var(--line);border-radius:3px;padding:22px clamp(16px,4vw,28px);margin-bottom:20px;}
  .panel h2{margin-top:0;font-size:1.3rem;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid.one{grid-template-columns:1fr;}
  @media (max-width:560px){.form-grid{grid-template-columns:1fr;}}
  label{display:flex;flex-direction:column;gap:5px;font-size:.8rem;color:var(--cream-dim);}
  input,select,textarea{background:var(--iron-950);border:1px solid var(--line);color:var(--cream);padding:10px 12px;border-radius:2px;font-size:.9rem;font-family:inherit;}
  textarea{resize:vertical;min-height:70px;}
  .checks{display:flex;flex-wrap:wrap;gap:10px;}
  .checks label{flex-direction:row;align-items:center;gap:6px;font-size:.82rem;} .checks input{width:auto;}
  .form-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .err{color:var(--ember-bright);font-size:.82rem;margin-top:6px;}
  .ok-msg{color:var(--ok);font-size:.82rem;margin-top:6px;}
  table{width:100%;border-collapse:collapse;font-size:.85rem;}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);}
  th{color:var(--brass-dim);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;}
  .status{padding:2px 9px;border-radius:2px;font-size:.72rem;border:1px solid var(--line);}
  .status.new{color:var(--ember-bright);border-color:var(--ember);}
  .status.done{color:var(--ok);border-color:var(--ok);}
  .status.processing{color:var(--brass);border-color:var(--brass-dim);}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .row-actions .btn{padding:5px 10px;font-size:.75rem;}
  .breadcrumb{font-size:.78rem;color:var(--cream-dim);margin-bottom:14px;}
  .breadcrumb button{background:none;border:none;color:var(--brass);padding:0;font-size:.78rem;}
  .detail-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:28px;}
  @media (max-width:760px){.detail-wrap{grid-template-columns:1fr;}}
  .detail-photo{border-radius:3px;overflow:hidden;border:1px solid var(--line);min-height:260px;background:linear-gradient(160deg,var(--iron-800),var(--iron-950));display:flex;align-items:center;justify-content:center;}
  .detail-photo img{width:100%;height:100%;object-fit:cover;}
  .pay-opts{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
  .pay-opts span{background:var(--iron-800);border:1px solid var(--brass-dim);color:var(--brass);padding:5px 11px;border-radius:2px;font-size:.78rem;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brass);color:var(--iron-950);padding:11px 20px;border-radius:2px;font-size:.85rem;font-weight:600;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.4);}
  .modal-bg{position:fixed;inset:0;background:rgba(10,9,8,.72);display:flex;align-items:center;justify-content:center;padding:20px;z-index:40;}
  .modal{background:var(--iron-900);border:1px solid var(--line);border-radius:3px;padding:24px;max-width:440px;width:100%;max-height:88vh;overflow:auto;}
  .modal h3{margin-top:0;}
  .close-x{float:right;background:none;border:none;color:var(--cream-dim);font-size:1.1rem;}
  .hint{font-size:.75rem;color:var(--cream-dim);margin-top:4px;}
  .super-badge{font-size:.7rem;color:var(--ember-bright);border:1px solid var(--ember);padding:2px 8px;border-radius:2px;margin-left:8px;}
  .loading{text-align:center;padding:60px;color:var(--brass-dim);}
  footer{text-align:center;padding:26px 20px 40px;color:var(--brass-dim);font-size:.75rem;}
</style>

/* ---------------- CATALOG ---------------- */
function visibleListings(){
  const q = filters.search.trim().toLowerCase();
  const min = filters.priceMin!=='' ? Number(filters.priceMin) : null;
  const max = filters.priceMax!=='' ? Number(filters.priceMax) : null;
  const maxDays = filters.maxDays!=='all' ? Number(filters.maxDays) : null;
  let items = listings.filter(l=>{
    if (filters.onlyFav && !favorites.has(l.id)) return false;
    if (filters.type!=='all' && l.type!==filters.type) return false;
    if (filters.material!=='all' && l.material!==filters.material) return false;
    if (q && !l.title.toLowerCase().includes(q) && !(l.description||'').toLowerCase().includes(q)) return false;
    if (min!==null && l.price<min) return false;
    if (max!==null && l.price>max) return false;
    if (maxDays!==null && Number(l.installDays||999)>maxDays) return false;
    return true;
  });
  if (filters.sort==='new') items.sort((a,b)=>b.createdAt-a.createdAt);
  else if (filters.sort==='price_asc') items.sort((a,b)=>a.price-b.price);
  else if (filters.sort==='price_desc') items.sort((a,b)=>b.price-a.price);
  else if (filters.sort==='fast') items.sort((a,b)=>(a.installDays||999)-(b.installDays||999));
  return items;
}
function updateFilter(key,val){ filters[key]=val; renderApp(); }

      '<option value="wicket" '+(l.type==='wicket'?'selected':'')+'>'+t('type_wicket_s')+'</option>'+
    '</select></label>'+
    '<label>'+t('f_title')+'<input id="lfTitle" value="'+esc(l.title||'')+'" placeholder="'+esc(t('f_title_ph'))+'"></label>'+
    '<label>'+t('f_width')+'<input id="lfWidth" type="number" value="'+(l.width||'')+'" placeholder="400"></label>'+
    '<label>'+t('f_height')+'<input id="lfHeight" type="number" value="'+(l.height||'')+'" placeholder="200"></label>'+
    '<label>'+t('f_material')+'<input id="lfMaterial" value="'+esc(l.material||'')+'" placeholder="'+esc(t('f_material_ph'))+'"></label>'+
    '<label>'+t('f_thickness')+'<input id="lfThickness" type="number" step="0.1" value="'+(l.thickness||'')+'" placeholder="2"></label>'+
    '<label>'+t('f_price')+'<input id="lfPrice" type="number" value="'+(l.price||'')+'" placeholder="485000"></label>'+
    '<label>'+t('f_days')+'<input id="lfDays" type="number" value="'+(l.installDays||'')+'" placeholder="14"></label>'+
    '<label>'+t('f_phone')+'<input id="lfPhone" value="'+esc(l.phone||currentUser.phone||'')+'" placeholder="+7 ..."></label>'+
    '<label>'+t('f_photo')+'<input id="lfPhoto" value="'+esc(l.photoUrl||'')+'" placeholder="https://..."></label>'+
  '</div>'+
  '<label style="margin-top:10px;">'+t('f_desc')+'<textarea id="lfDesc">'+esc(l.description||'')+'</textarea></label>'+
  '<div class="hint" style="margin-top:12px;">'+t('f_payment_title')+'</div>'+
  '<div class="checks">'+payKeys.map(k=>'<label><input type="checkbox" value="'+k+'" '+(pay.includes(k)?'checked':'')+' class="payChk"> '+payLabel(k)+'</label>').join('')+'</div>'+
  '<div id="lfErr" class="err"></div>'+
  '<div class="form-actions">'+
    '<button class="btn btn-solid" onclick="saveListing('+(editing?"'"+l.id+"'":'null')+')">'+(editing?t('f_save'):t('f_publish'))+'</button>'+
    (editing?'<button class="btn btn-ghost" onclick="renderApp()">'+t('cancel')+'</button>':'')+
  '</div>';
}

async function saveListing(id){
  const title = document.getElementById('lfTitle').value.trim();
  const width = Number(document.getElementById('lfWidth').value);
  const height = Number(document.getElementById('lfHeight').value);
  const material = document.getElementById('lfMaterial').value.trim();
  const thickness = Number(document.getElementById('lfThickness').value);
  const price = Number(document.getElementById('lfPrice').value);
  const installDays = Number(document.getElementById('lfDays').value) || null;
  const phone = document.getElementById('lfPhone').value.trim();
  const photoUrl = document.getElementById('lfPhoto').value.trim();
  const description = document.getElementById('lfDesc').value.trim();
  const type = document.getElementById('lfType').value;
  const payment = [...document.querySelectorAll('.payChk')].filter(c=>c.checked).map(c=>c.value);

  if (!title || !width || !height || !material || !price || !phone){
    document.getElementById('lfErr').textContent = t('f_err_required'); return;
  }
  const row = { type, title, width, height, material, thickness, price, install_days: installDays, payment, photo_url: photoUrl, description, phone };
  let error;
  if (id){ ({ error } = await sb.from('listings').update(row).eq('id', id)); }
  else { row.admin_id = currentUser.id; ({ error } = await sb.from('listings').insert(row)); }
  if (error){ document.getElementById('lfErr').textContent = error.message; return; }
  toast(id ? t('f_saved') : t('f_published'));
  await loadListings(); renderApp();
}

function editListing(id){
  const l = listings.find(x=>x.id===id);
  if (!l || l.adminId !== currentUser.id) return;
  document.getElementById('app').innerHTML = '<div class="panel"><h2>'+t('f_save')+'</h2>'+listingFormHtml(l)+'</div>' + document.getElementById('app').innerHTML;
}

async function deleteListing(id){
  const l = listings.find(x=>x.id===id);
  if (!l) return;
  if (currentUser.role==='admin' && l.adminId!==currentUser.id) return;
  if (!confirm(t('confirm_delete_listing'))) return;
  const { error } = await sb.from('listings').delete().eq('id', id);
  if (error){ toast(error.message); return; }
  await loadListings(); renderApp();
}

function renderListingsTable(items, showOwner){
  if (items.length===0) return '<div class="empty">'+t('empty_listings')+'</div>';
  return '<table><tr><th>'+t('th_listing')+'</th><th>'+t('th_type')+'</th><th>'+t('th_size')+'</th><th>'+t('th_price')+'</th><th>'+t('th_days')+'</th>'+
    (showOwner?'<th>'+t('th_master')+'</th>':'')+'<th></th></tr>'+
    items.map(l=>{
      const ownerName = showOwner ? (admins.find(a=>a.id===l.adminId)?.name || '—') : '';
      return '<tr><td>'+esc(l.title)+'</td><td>'+(l.type==='gate'?t('type_gate_s'):t('type_wicket_s'))+'</td>'+
        '<td>'+l.width+'×'+l.height+'</td><td class="mono">'+money(l.price)+'</td>'+
        '<td>'+(l.installDays?l.installDays+' '+t('days_short'):'—')+'</td>'+
        (showOwner?'<td>'+esc(ownerName)+'</td>':'')+
        '<td class="row-actions">'+
          '<button class="btn" onclick="copyLink(\''+l.id+'\')">'+t('btn_link')+'</button>'+
          (currentUser.role==='admin'?'<button class="btn" onclick="editListing(\''+l.id+'\')">'+t('btn_edit')+'</button>':'')+
          '<button class="btn btn-ember" onclick="deleteListing(\''+l.id+'\')">'+t('delete')+'</button>'+
        '</td></tr>';
    }).join('')+
  '</table>';
}

function renderOrdersTable(items){
  if (items.length===0) return '<div class="empty">'+t('empty_orders')+'</div>';
  return '<table><tr><th>'+t('th_order_listing')+'</th><th>'+t('th_order_name')+'</th><th>'+t('th_order_phone')+'</th><th>'+t('th_order_comment')+'</th><th>'+t('th_order_status')+'</th><th></th></tr>'+
    [...items].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map(o=>{
      const l = listings.find(x=>x.id===o.listing_id);
      const statusLabel = o.status==='new'?t('status_new'):o.status==='processing'?t('status_processing'):t('status_done');
      return '<tr><td>'+esc(l?l.title:t('deleted_label'))+'</td><td>'+esc(o.name)+'</td><td class="mono">'+esc(o.phone)+'</td>'+
        '<td>'+esc(o.comment||'—')+'</td><td><span class="status '+o.status+'">'+statusLabel+'</span></td>'+
        '<td class="row-actions">'+
          (o.status!=='processing'?'<button class="btn" onclick="setOrderStatus(\''+o.id+'\',\'processing\')">'+t('to_work')+'</button>':'')+
          (o.status!=='done'?'<button class="btn" onclick="setOrderStatus(\''+o.id+'\',\'done\')">'+t('done')+'</button>':'')+
        '</td></tr>';
    }).join('')+
  '</table>';
}

async function setOrderStatus(id, status){
  const { error } = await sb.from('orders').update({ status }).eq('id', id);
  if (error){ toast(error.message); return; }
  await loadMyOrders(); renderApp();
}

/* ---------------- main render (сохраняет фокус полей при перерисовке) ---------------- */
function renderApp(){
  renderNav();
  const app = document.getElementById('app');
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const selStart = active && 'selectionStart' in active ? active.selectionStart : null;
  const selEnd = active && 'selectionEnd' in active ? active.selectionEnd : null;

  if (view==='catalog') app.innerHTML = renderCatalog();
  else if (view==='detail') app.innerHTML = renderDetail();
  else if (view==='login') app.innerHTML = renderLogin();
  else if (view==='super' && currentUser?.role==='super') app.innerHTML = renderSuper();
  else if (view==='admin' && currentUser?.role==='admin') app.innerHTML = renderAdmin();
  else { view='catalog'; app.innerHTML = renderCatalog(); }

  if (activeId){
    const el = document.getElementById(activeId);
    if (el){ el.focus(); if (selStart!==null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} } }
  }
}

(async function init(){
  document.documentElement.lang = LANG;
  await restoreSession();
  await loadListings();
  if (currentUser){
    if (currentUser.role==='super'){ await loadAdmins(); await loadMyOrders(); view='super'; }
    else { await loadMyOrders(); view='admin'; }
  }
  checkHash();
  renderApp();
})();
</script>
